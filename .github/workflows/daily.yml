name: 살래말래 일일 핫딜

on:
  schedule:
    - cron: '7 3 * * *'  # 매일 03:07 UTC = 12:07 KST (정시 cron 지연 회피)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 봇 실행
        env:
          BOT_ENV: prod
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_PROD: ${{ secrets.DISCORD_CHANNEL_PROD }}
          DISCORD_THREAD_PROD: ${{ secrets.DISCORD_THREAD_PROD }}
        run: python -m app run-once
